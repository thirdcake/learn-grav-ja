<button type="button" 
    class="btn btn-primary d-lg-none"
    data-bs-toggle="offcanvas"
    data-bs-target="#offcanvasResponsive"
    aria-controls="offcanvasResponsive">Toggle offcanvas</button>

<div class="offcanvas-lg offcanvas-start"
    tabindex="-1" id="offcanvasResponsive"
    aria-labelledby="offcanvasResponsiveLabel">
    <div class="offcanvas-body d-lg-block pt-0" style="overflow-y:unset;">
        <div class="d-flex flex-column"
            style="height:100dvh">
            <header class="flex-shrink-0 flex-grow-0
                d-flex justify-content-between align-items-center
                border-bottom ps-3"
                style="height: 4rem;">
                This is content within
                <button type="button"
                    class="btn-close" data-bs-dismiss="offcanvas"
                    data-bs-target="#offcanvasResponsive"
                    aria-label="Close"></button>
            </header>
            <div class="flex-grow-1 pb-5"
                style="min-height:0; overflow-y:auto;">
                {{ partial "node_tree.html" . }}
            </div>
        </div>
    </div>
    <!--
    <div class="d-block d-lg-none">
        <p>footer</p>
    </div>
    -->
</div>
