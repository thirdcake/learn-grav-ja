<button type="button" 
    class="btn btn-primary d-lg-none"
    data-bs-toggle="offcanvas"
    data-bs-target="#offcanvasResponsive"
    aria-controls="offcanvasResponsive">Toggle offcanvas</button>

<div class="offcanvas-lg offcanvas-start"
    tabindex="-1" id="offcanvasResponsive"
    aria-labelledby="offcanvasResponsiveLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title"
            id="offcanvasResponsiveLabel">Responsive offcanvas</h5>
        <button type="button"
            class="btn-close" data-bs-dismiss="offcanvas"
            data-bs-target="#offcanvasResponsive"
            aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-lg-block">
        <p class="mb-0 alert alert-info">This is content within an <code>.offcanvas-lg</code>.</p>
    </div>
    <div class="d-block d-lg-none">
        <p>footer</p>
    </div>
</div>
