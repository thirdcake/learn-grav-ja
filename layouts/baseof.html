<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ with .Title}} | {{ end }}{{ site.Title }}</title>
    <script>(function(){document.documentElement.dataset.bsTheme=window.matchMedia('(prefers-color-scheme: dark)').matches ?'dark':'light'})()</script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    {{ partial "opengraph" . }}
    {{ partial "twitter_cards.html" . }}
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="{{ "img/favicon.svg" | absURL }}">
    <link rel="stylesheet" href="{{ "css/bootstrap.min.css" | absURL }}">
    <link rel="stylesheet" href="{{ "css/custom.css" | absURL }}">
    <script defer src="{{ "js/bootstrap.min.js" | absURL }}"></script>
    <script defer src="{{ "js/custom.js" | absURL }}"></script>
</head>
<body>
    <div class="d-block d-lg-flex align-items-start" style="position:relative;width: 100%;">
        <div class="offcanvas-wrapper flex-shrink-0 border-end" style="width: 280px;">
            {{ partial "sidebar.html" . }}
        </div>

        <div class="flex-shrink-1" style="min-width:0;width:100%;flex-basis:100%;">

            <header class="px-3 border-bottom
                d-flex justify-content-end align-items-center"
                style="height:4rem;overflow-x:hidden;">
                {{ partial "header.html" . }}
            </header>

            <main class="container-fluid p-4" style="width:100%;min-width:0;">
                {{ block "main" . }}{{ end }}
            </main>

            <footer>
                {{ partial "footer.html" . }}
            </footer>
        </div>
    </div>
</body>
</html>
