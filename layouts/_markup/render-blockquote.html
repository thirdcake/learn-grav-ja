{{ if eq .Type "alert" }}
    <div class="alert alert-{{ .AlertType }}">
        <p class="m-0">
            <svg viewBox="0 0 16 16" style="width:1rem;height:auto;">
                <use href="{{ relURL "images/icons.svg" }}#alert-{{ .AlertType}}"></use>
            </svg>
      {{ with .AlertTitle }}
        {{ . }}
      {{ else }}
        {{ or (i18n .AlertType) (title .AlertType) }}
      {{ end }}
    </p>
    {{ .Text }}
  </div>
{{ else }}
  <blockquote>
    {{ .Text }}
  </blockquote>
{{ end }}
